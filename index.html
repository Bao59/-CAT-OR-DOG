<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 貓狗視覺分類系統</title>
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
        }
        
        body { 
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 { margin-top: 0; font-size: 1.5rem; }
        
        /* 檔案上傳區塊的樣式 */
        .upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 40px 20px;
            margin: 20px 0;
            background-color: #f8fafc;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover { border-color: var(--primary-color); background-color: #eff6ff; }
        
        input[type="file"] { display: none; }
        
        #image-preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        /* 進度條樣式 */
        #label-container { margin-top: 20px; text-align: left; }
        .result-row { margin-bottom: 12px; }
        .class-name { font-weight: bold; margin-bottom: 5px; display: block; }
        .progress-bg { background: #e2e8f0; height: 12px; border-radius: 6px; overflow: hidden; }
        .progress-fill { background: var(--primary-color); height: 100%; width: 0%; transition: width 0.3s ease; }
    </style>
</head>
<body>

    <div class="container">
        <h1>影像辨識分析系統</h1>
        <p style="color: #64748b; margin-bottom: 25px;">(模型初始化中，請稍候...)</p>

        <label class="upload-area" id="upload-label">
            <div id="upload-text">點擊此處上傳圖片 (JPG / PNG)</div>
            <img id="image-preview" src="" alt="圖片預覽" />
            <input type="file" id="image-upload" accept="image/*">
        </label>

        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "./model/";
        let model, maxPredictions;

        // 1. 網頁載入時立刻讀取模型
        window.onload = async function() {
            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";
                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();
                
                document.querySelector('p').innerText = "系統已就緒，請上傳照片進行辨識";
                document.querySelector('p').style.color = "#10b981"; // 綠色提示
            } catch (error) {
                document.querySelector('p').innerText = "模型載入失敗，請確認 ./model/ 路徑！";
                document.querySelector('p').style.color = "#ef4444";
            }
        };

        // 2. 監聽圖片上傳事件
        const imageUpload = document.getElementById('image-upload');
        const imagePreview = document.getElementById('image-preview');
        const uploadText = document.getElementById('upload-text');

        imageUpload.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file && model) {
                // 顯示圖片預覽
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                    uploadText.style.display = 'none';
                    
                    // 圖片載入完成後進行推論
                    imagePreview.onload = async function() {
                        await predict(imagePreview);
                    }
                }
                reader.readAsDataURL(file);
            }
        });

        // 3. 進行預測
        async function predict(imageElement) {
            // 將靜態圖片送入模型
            const prediction = await model.predict(imageElement);
            
            const labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // 清空舊結果

            // 產出結果與進度條
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const prob = (prediction[i].probability * 100).toFixed(1);
                
                labelContainer.innerHTML += `
                    <div class="result-row">
                        <span class="class-name">${className} (${prob}%)</span>
                        <div class="progress-bg">
                            <div class="progress-fill" style="width: ${prob}%"></div>
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
